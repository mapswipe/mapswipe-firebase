[project]
name = "pyfirebase-mapswipe"
version = "0.1.0"
description = "Python library for pydantic classes for MapSwipe Firebase"
authors = [
  {name = "Mapswipe", email = "info@mapswipe.org"},
]
license = { text = "Apache-2.0" }
requires-python = "~=3.13.2"
dependencies = [
    "pydantic==2.10.6",
]
readme = "README.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pyfirebase_mapswipe"]
