# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbStreetTutorial:
  model: alias
  type:
    type: object
    fields:
      projectType:
        type:
          type: literal
          value: 7
      customOptions:
        optional: true
        type:
          type: list
          elementType: FbObjCustomOption
      imageProvider:
        optional: true
        type: FbObjImageProvider

FbStreetTutorialTask:
  model: alias
  type:
    type: object
    fields:
      projectId:
        type: string
      groupId:
        type: int
      taskId:
        type: string
      geometry: # NOTE: geometry as WKT
        type: string
      referenceAnswer:
        type: int
      screen:
        type: int
