# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbCompareTutorial:
  model: alias
  type:
    type: object
    fields:
      projectType:
        type:
          type: literal
          value: 3
      tileServer:
        type: FbObjRasterTileServer
      tileServerB:
        type: FbObjRasterTileServer
      zoomLevel:
        type: int

FbCompareTutorialTask:
  model: alias
  type:
    type: object
    fields:
      url:
        type: string
      urlB:
        type: string
