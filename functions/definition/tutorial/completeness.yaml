# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbCompletenessTutorial:
  model: alias
  type:
    type: object
    fields:
      projectType:
        type:
          type: literal
          value: 4
      tileServer:
        type: FbObjRasterTileServer
      tileServerB:
        type: FbObjRasterTileServer
      overlayTileServer:
        type: FbObjUnifiedOverlayTileServer
      zoomLevel:
        type: int

FbCompletenessTutorialTask:
  model: alias
  type:
    type: object
    fields:
      url:
        type: string
      urlB:
        type: string
