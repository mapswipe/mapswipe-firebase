# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbFindTutorial:
  model: alias
  type:
    type: object
    fields:
      projectType:
        type:
          type: literal
          value: 1
      tileServer:
        type: FbObjRasterTileServer
      zoomLevel:
        type: int

FbFindTutorialGroup:
  model: alias
  type:
    type: object
    fields:
      xMax:
        type: int
      xMin:
        type: int
      yMax:
        type: int
      yMin:
        type: int

FbFindTutorialTask:
  model: alias
  type:
    type: object
    fields:
      geometry: # NOTE: initially empty string
        type: string
      groupId:
        type: int
      projectId:
        type: string
      referenceAnswer:
        type: int
      screen:
        type: int
      taskId:
        type: string
      taskId_real:
        type: string
      taskX:
        type: int
      taskY:
        type: int
      url:
        type: string
