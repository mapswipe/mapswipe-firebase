# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbFindTutorial:
  model: alias
  type:
    type: object
    fields:
      projectType:
        type:
          type: literal
          value: 1
      tileServer:
        type: FbObjRasterTileServer
      zoomLevel:
        type: int

FbFindTutorialTask:
  model: alias
  type:
    type: object
    fields:
      url:
        type: string
