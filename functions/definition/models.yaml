# yaml-language-server: $schema=https://schema.typesync.org/v0.13.json

# NOTE: projectsUsers and groupsUsers cannot be modeled

# XXX(tnagorra): The pydantic classess are generated in alphabetical order.
# So, we must be careful on how we name the models so that the dependencies
# are always generated before hand.

# ENUM

FbEnumUserGroupMembershipAction:
  model: alias
  type:
    type: enum
    members:
      - label: 'JOIN'
        value: 'join'
      - label: 'LEAVE'
        value: 'leave'

FbEnumRasterTileServerName:
  model: alias
  docs: Represents a project status
  type:
    type: enum
    members:
      - label: CUSTOM
        value: custom
      - label: BING
        value: bing
      - label: MAPBOX
        value: mapbox
      - label: MAXAR_STANDARD
        value: maxarStandard
      - label: MAXAR_PREMIUM
        value: maxarPremium
      - label: ESRI
        value: esri
      - label: ESRI_BETA
        value: esriBeta

FbEnumProjectStatus:
  model: alias
  docs: Represents a project status
  type:
    type: enum
    members:
      - label: "ACTIVE"
        value: active
      - label: "INACTIVE"
        value: inactive
      - label: "PRIVATE_INACTIVE"
        value: private_inactive
      - label: "PRIVATE_ACTIVE"
        value: private_active
      - label: "FINISHED"
        value: finished

FbEnumProjectType:
  model: alias
  docs: Represents a project type
  type:
    type: enum
    members:
      - label: 'FIND'
        value: 1
      - label: 'VALIDATE'
        value: 2
      - label: 'VALIDATE_IMAGE'
        value: 10
      - label: 'COMPARE'
        value: 3
      - label: 'COMPLETENESS'
        value: 4

# ANNOUNCEMENT

FbAnnouncement:
  model: document
  path: v2/announcement
  type:
    type: object
    fields:
      url:
        type: string
      text:
        type: string

# ORGANISATION

FbOrganisation:
  model: document
  path: organisations/{organisation_id}
  type:
    type: object
    fields:
      name:
        type: string
      description:
        type: string
      # NOTE: We can remove this
      nameKey:
        type: string

# TEAM

FbTeam:
  model: document
  path: teams/{teamId}
  docs: Represents a mapswipe team
  type:
    type: object
    fields:
      teamName:
        type: string
      teamToken:
        type: timestamp

# PROJECT

FbObjRasterTileServer:
  model: alias
  docs: Represents a raster tile server
  type:
    type: object
    fields:
      # NOTE: @deprecated
      apiKey:
        optional: true
        type: string
      # NOTE: @deprecated
      wmtsLayerName:
        optional: true
        type: string
      credits:
        type: string
      name:
        type: FbEnumRasterTileServerName
      url:
        type: string

FbProjectReadonlyType:
  model: alias
  docs: Represents fields that cannot be updated from backend
  type:
    type: object
    fields:
      contributorCount:
        type: int
      progress:
        type: int
      resultCount:
        type: int

FbProjectUpdateInput:
  model: alias
  docs: Represents fields that are valid while updating a project
  type:
    type: object
    fields:
      image:
        type: string
        optional: true
      isFeatured:
        type: boolean
      lookFor:
        type: string
      name:
        type: string
      projectDetails:
        type: string
      projectNumber:
        type: int  # NOTE: This could also be str?
      projectRegion:
        type: string
      projectTopic:
        type: string
        # NOTE: We can remove this later @deprecated
      projectTopicKey:
        type: string
      requestingOrganisation:
        type: string
      tutorialId:
        type: string
        # NOTE: en-us
      language:
        type: string
      manualUrl:
        optional: true
        type: string
      teamId:
        optional: true
        type: string
      status:
        type: FbEnumProjectStatus

FbProjectCreateOnlyInput:
  model: alias
  docs: Represents fields that are valid only while creating a project
  type:
    type: object
    fields:
      created:
        type: timestamp
      createdBy:
        type: string
      # NOTE: this is zero during project creation
      groupMaxSize:
        type: int
      groupSize:
        type: int
      maxTasksPerUser:
        optional: true
        type: int
      projectId:
        type: string
      projectType:
        type: FbEnumProjectType
      # project_type:
      #   type: FbEnumProjectType
      requiredResults:
        type: int
      verificationNumber:
        type: int
      # PROJECT SPECIFIC FIELDS
      zoomLevel:
        type: int
        optional: true
      tileServer:
        type: FbObjRasterTileServer
        optional: true
      tileServerB:
        type: FbObjRasterTileServer
        optional: true

# MAPPING

FbMappingGroup:
  model: alias
  # model: document
  # path: groups/{projectId}/{groupId}
  docs: Represents a group in a mapswipe project
  type:
    type: object
    fields:
      # default is zero
      finishedCount:
        type: int
      # ex: g101
      groupId:
        type: string
      numberOfTasks:
        type: int
      # default is zero
      progress:
        type: int
      projectId:
        type: string
      requiredCount:
        type: int
      # PROJECT SPECIFIC FIELDS
      xMax:
        type: int
        optional: true
      xMin:
        type: int
        optional: true
      yMax:
        type: int
        optional: true
      yMin:
        type: int
        optional: true

FbMappingTask:
  model: alias
  # model: document
  # path: tasks/{projectId}/{groupId}/{index}
  docs: Repesents a task in a group in a project
  type:
    type: object
    fields:
      groupId:
        type: string
      projectId:
        type: string
      taskId:
        type: string  # NOTE: int for street
      # For find, completeness, compare
      taskX:
        type: int  # NOTE: this was string previously
        optional: true
      taskY:
        type: int  # NOTE: this was string previously
        optional: true
      url:
        type: string
        optional: true
      # For compare
      urlB:
        type: string
        optional: true

FbMappingResult:
  model: alias
  # model: document
  # path: results/{projectId}/{groupId}/{userId}
  docs: Represents a mapswipe project
  type:
    type: object
    fields:
      appVersion:
        type: string
      clientType:
        # FIXME: this is an enum
        type: string
        optional: true
      endTime:
        type: timestamp
      startTime:
        type: timestamp
      results:
        type:
          # NOTE: The key is taskId
          type: map
          valueType: int
      usergroups:
        optional: true
        type:
          # NOTE: The key is usergroupId
          type: map
          valueType: boolean

# USER AND USER GROUP

FbUserGroup:
  model: document
  path: userGroups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      # TODO: this is an enum
      createdAt:
        type: int
      createdBy:
        type: string
      description:
        type: string
      name:
        type: string
      # NOTE: We can remove this
      nameKey:
        type: string
      users:
        type:
          type: map
          valueType: unknown

FbUserGroupObsolete:
  model: document
  path: user_groups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      name:
        type: string
      description:
        type: string

FbUserGroupMembership:
  model: document
  path: userGroupMembershipLogs/{userGroupId}
  docs: Represents a user contribution
  type:
    type: object
    fields:
      action:
        type: FbEnumUserGroupMembershipAction
      timestamp:
        type: timestamp
      userGroupId:
        type: string
      userId:
        type: string

FbUser:
  model: document
  path: users/{userId}
  docs: Represents a user
  type:
    type: object
    fields:
      created:
        type: timestamp
      userName:
        type: string
      # NOTE: We can remove this
      userNameKey:
        type: string
      username:
        type: string
      # NOTE: We can remove this
      usernameKey:
        type: string
      accessibility:
        optional: true
        type: boolean
      userGroups:
        optional: true
        type:
          type: map
          valueType: unknown

FbUserContribution:
  model: alias
  # model: document
  # path: userContributions/{userId}/{projectId}/{groupId}
  docs: Represents a user contribution
  type:
    type: object
    fields:
      endTime:
        type: timestamp
      startTime:
        type: timestamp
      timestamp:
        type: timestamp
