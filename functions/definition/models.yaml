# yaml-language-server: $schema=https://schema.typesync.org/v0.13.json

# NOTE: projectUsers and groupUsers cannot be modeled

# Organisation

UserGroupMembershipActionEnum:
  model: alias
  type:
    type: enum
    members:
      - value: 'join'
        label: 'Join'
      - value: 'leave'
        label: 'Leave'

Announcement:
  model: document
  path: v2/announcement
  type:
    type: object
    fields:
      url:
        type: string
      text:
        type: string

Organisation:
  model: document
  path: organisations/{organisation_id}
  type:
    type: object
    fields:
      name:
        type: string
      description:
        type: string
      # NOTE: We can remove this
      nameKey:
        type: string

# Team

Team:
  model: document
  path: teams/{teamId}
  docs: Represents a mapswipe team
  type:
    type: object
    fields:
      teamName:
        type: string
      teamToken:
        type: timestamp

# Project

ProjectRasterTileServer:
  model: alias
  docs: Represents a raster tile server
  type:
    type: object
    fields:
      apiKey:
        optional: true
        type: string
      credits:
        type: string
      name:
        # TODO: We might need to use enum here
        type: string
      url:
        type: string

ProjectStatus:
  model: alias
  docs: Represents a project status
  type:
    type: union
    variants:
      - type: literal
        value: finished

ProjectTypeEnum:
  model: alias
  docs: Represents a project type
  type:
    type: enum
    members:
      - label: 'Find'
        value: 1
      - label: 'Validate'
        value: 2
      - label: 'Compare'
        value: 3
      - label: 'Completeness'
        value: 4

Project:
  model: document
  path: projects/{projectId}
  docs: Represents a mapswipe project
  type:
    type: object
    fields:
      created:
        type: timestamp
      createdBy:
        type: string
      contributorCount:
        type: int
      groupMaxSize:
        type: int
      groupSize:
        type: int
      image:
        type: string
      isFeatured:
        type: boolean
      lookFor:
        type: string
      name:
        type: string
      progress:
        type: int
      projectDetails:
        type: string
      projectId:
        type: string
      projectNumber:
        type: string
      projectRegion:
        type: string
      projectTopic:
        type: string
      # NOTE: We can remove this
      projectTopicKey:
        type: string
      projectType:
        type: ProjectTypeEnum
      project_type:
        type: ProjectTypeEnum
      requestingOrganisation:
        type: string
      requiredResults:
        type: int
      resultCount:
        type: int
      status:
        type: ProjectStatus
      tutorialId:
        type: string
      verificationNumber:
        type: int
      zoomLevel:
        type: int
      tileServer:
        type: ProjectRasterTileServer
      tileServerB:
        type: ProjectRasterTileServer
        optional: true

# Mapping

MappingGroup:
  model: alias
  # model: document
  # path: groups/{projectId}/{groupId}
  docs: Represents a group in a mapswipe project
  type:
    type: object
    fields:
      finishedCount:
        type: int
      groupId:
        type: string
      numberOfTasks:
        type: int
      progress:
        type: int
      projectId:
        type: string
      requiredCount:
        type: int
      # NOTE: These are string but with numeric values
      xMax:
        type: string
        optional: true
      xMin:
        type: string
        optional: true
      yMax:
        type: string
        optional: true
      yMin:
        type: string
        optional: true

MappingTask:
  model: alias
  # model: document
  # path: tasks/{projectId}/{groupId}/{index}
  docs: Repesents a task in a group in a project
  type:
    type: object
    fields:
      groupId:
        type: string
      projectId:
        type: string
      taskId:
        type: string
      taskX:
        type: string
        optional: true
      taskY:
        type: string
        optional: true
      url:
        type: string

MappingResult:
  model: alias
  #jmodel: document
  #jpath: results/{projectId}/{groupId}/{taskId}
  docs: Represents a mapswipe project
  type:
    type: object
    fields:
      appVersion:
        type: string
      endTime:
        type: timestamp
      startTime:
        type: timestamp
      results:
        type:
          type: map
          valueType: int

# User and User group

UserGroup:
  model: document
  path: userGroups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      # TODO: this is an enum
      createdAt:
        type: int
      createdBy:
        type: string
      description:
        type: string
      name:
        type: string
      # NOTE: We can remove this
      nameKey:
        type: string
      users:
        type:
          type: map
          valueType: unknown

UserGroupObsolete:
  model: document
  path: user_groups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      name:
        type: string
      description:
        type: string

UserGroupMembership:
  model: document
  path: userGroupMembershipLogs/{userGroupId}
  docs: Represents a user contribution
  type:
    type: object
    fields:
      action:
        type: UserGroupMembershipActionEnum
      timestamp:
        type: timestamp
      userGroupId:
        type: string
      userId:
        type: string

User:
  model: document
  path: users/{userId}
  docs: Represents a user
  type:
    type: object
    fields:
      created:
        type: timestamp
      userName:
        type: string
      # NOTE: We can remove this
      userNameKey:
        type: string
      username:
        type: string
      # NOTE: We can remove this
      usernameKey:
        type: string
      accessibility:
        optional: true
        type: boolean
      userGroups:
        optional: true
        type:
          type: map
          valueType: unknown


UserContribution:
  model: alias
  # model: document
  # path: userContributions/{userId}/{projectId}/{groupId}
  docs: Represents a user contribution
  type:
    type: object
    fields:
      endTime:
        type: timestamp
      startTime:
        type: timestamp
      timestamp:
        type: timestamp

