# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbOrganisation:
  model: alias
  # path: organisations/{organisation_id}
  docs: Represents the requesting organisation.
  type:
    type: object
    fields:
      name:
        type: string
      description:
        optional: true
        type: string
      nameKey:
        type: string
        deprecated: true
      abbreviation:
        optional: true
        type: string
      isArchived:  # This was added on revamp
        type: boolean
