# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbUserGroupReadOnlyType:
  model: alias
  # path: userGroups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      users:
        optional: true
        type:
          type: map
          valueType: unknown

FbUserGroupCreateOnlyInput:
  model: alias
  # path: userGroups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      createdAt:
        type: int
      createdBy:
        type: string

FbUserGroupUpdateInput:
  model: alias
  # path: userGroups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      description:
        type: string
      name:
        type: string
      nameKey:
        type: string
        deprecated: true

FbUserGroupObsolete:
  model: alias
  # path: user_groups/{userGroupId}
  docs: Represents a usergroup
  type:
    type: object
    fields:
      name:
        type: string
      description:
        type: string

FbUserGroupMembership:
  model: alias
  # path: userGroupMembershipLogs/{userGroupId}
  docs: Represents a user contribution
  type:
    type: object
    fields:
      action:
        type: FbEnumUserGroupMembershipAction
      timestamp:
        type: timestamp
      userGroupId:
        type: string
      userId:
        type: string
