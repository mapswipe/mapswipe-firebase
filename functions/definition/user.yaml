# yaml-language-server: $schema=https://raw.githubusercontent.com/toggle-corp/typesync/refs/tags/v1.0.0/schema.local.json

FbUserReadonlyType:
  model: alias
  docs: Represents user fields that cannot be updated from backend
  type:
    type: object
    fields:
      created:
        type: timestamp
      lastAppUse:
        type: timestamp
        optional: true
      userName:
        type: string
        deprecated: true
        optional: true
      userNameKey:
        type: string
        deprecated: true
        optional: true
      username:
        type: string
      usernameKey:
        # NOTE: web does not set usernameKey
        type: string
        optional: true
      accessibility:
        optional: true
        type: boolean
      userGroups:
        optional: true
        type:
          type: map
          valueType: unknown
      contributions:
        optional: true
        type:
          type: map
          valueType: unknown
      taskContributionCount:
        optional: true
        type: int
      groupContributionCount:
        optional: true
        type: int
      projectContributionCount:
        optional: true
        type: int

FbUserUpdateInput:
  model: alias
  # path: users/{userId}
  docs: Represents a user
  type:
    type: object
    fields:
      teamId:
        type: string
        optional: true
